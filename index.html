        <!-- UNIVERSAL GLOBAL SIDEBAR (Occupies 5.8% width on all screens)          -->
        <!-- ======================================================================= -->
        <div class="sidebar-container">
            <div class="sidebar">
                
                <!-- SCREEN 1 DECK: Top Action Buttons (Active on Home Screen) -->
                <div class="nav-group" id="deck-home-actions">
                    
                    <!-- Action Block 1: Settings -->
                    <div class="action-block">
                        <button class="side-btn btn-settings" onclick="sidebarAction('SETTINGS')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                        </button>
                        <div class="sidebar-legend-text">SETTINGS</div>
                    </div>
                    
                    <!-- Action Block 2: Plain Labels -->
                    <div class="action-block">
                        <button class="side-btn btn-plain" onclick="sidebarAction('PLAIN_MODE')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                                <rect x="6" y="14" width="12" height="8"></rect>
                            </svg>
                        </button>
                        <div class="sidebar-legend-text">PLAIN<br>LABELS</div>
                    </div>
                    
                    <!-- Action Block 3: Dispatch Labels -->
                    <div class="action-block">
                        <button class="side-btn btn-dispatch" onclick="sidebarAction('DISPATCH_MODE')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                <div class="nav-group screen-hide" id="deck-screen2-nav">
                    <button class="side-btn btn-legacy" onclick="sidebarAction('BACK')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#0091ea" stroke-width="3.5"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>BACK
                    </button>
                    <button class="side-btn btn-legacy" onclick="sidebarAction('MONTHS')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>MONTHS
                    </button>
                </div>

                <!-- Printer Status Module: Stays permanently visible at the bottom -->
                <div class="status-container">
                    <div class="status-title">PRINTER<br>STATUS</div>
                    <div class="status-row"><div class="color-box pink"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box green"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box yellow"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box blue"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box text-box">PLAIN</div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box text-box">DISP.</div><div class="led-dot"></div></div>
