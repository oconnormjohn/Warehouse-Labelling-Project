<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- SIMULATE NEXT YEAR BUTTON DEACTIVATED FOR SCREEN 1 PRODUCTION STABILISATION -->
    <!-- <button id="manual-sim-btn" onclick="triggerManualRollOver()">SIMULATE NEXT YEAR &raquo;</button> -->

    <div class="dashboard-wrapper">
                   <!-- ======================================================================= -->
            <!-- STAGE 1: NEW HOME SCREEN / CATEGORY SELECTION MATRIX WORKSPACE          -->
            <!-- ======================================================================= -->
                
                <!-- Main Category Grid Canvas: Occupies 91.5% of the viewport width    -->
                <div id="home-category-grid">
                    <!-- 35 physical standalone button slots for our 7x5 matrix          -->
                    <button class="home-cat-btn">1</button>
                    <button class="home-cat-btn">2</button>
                    <button class="home-cat-btn">3</button>
                    <button class="home-cat-btn">4</button>
                    <button class="home-cat-btn">5</button>
                    <button class="home-cat-btn">6</button>
                    <button class="home-cat-btn">7</button>
                    
                    <button class="home-cat-btn">8</button>
                    <button class="home-cat-btn">9</button>
                    <button class="home-cat-btn">10</button>
                    <button class="home-cat-btn">11</button>
                    <button class="home-cat-btn">12</button>
                    <button class="home-cat-btn">13</button>
                    <button class="home-cat-btn">14</button>
                    
                    <button class="home-cat-btn">15</button>
                    <button class="home-cat-btn">16</button>
                    <button class="home-cat-btn">17</button>
                    <button class="home-cat-btn">18</button>
                    <button class="home-cat-btn">19</button>
                    <button class="home-cat-btn">20</button>
                    <button class="home-cat-btn">21</button>
                    
                    <button class="home-cat-btn">22</button>
                    <button class="home-cat-btn">23</button>
                    <button class="home-cat-btn">24</button>
                    <button class="home-cat-btn">25</button>
                    <button class="home-cat-btn">26</button>
                    <button class="home-cat-btn">27</button>
                    <button class="home-cat-btn">28</button>
                    
                    <button class="home-cat-btn">29</button>
                    <button class="home-cat-btn">30</button>
                    <button class="home-cat-btn">31</button>
                    <button class="home-cat-btn">32</button>
                    <button class="home-cat-btn">33</button>
                    <button class="home-cat-btn">34</button>
                    <button class="home-cat-btn">35</button>
                </div>

            
            <!-- ======================================================================= -->

            <!-- Left Workspace View Panel Component Area (ORIGINAL EXPIRY GRID - HIDDEN BY DEFAULT) -->
            <div class="main-container" id="workspace-view" style="display: none;">
                <div class="header-title" id="category-header">
                    <span id="cat-word1">VEGETABLES</span><span id="cat-word2"></span>
                </div>
                <div class="grid-container" id="master-grid">
                    <!-- Automatically built by the dynamic JavaScript engine -->
                </div>
            </div>
        <!-- ======================================================================= -->
        <!-- UNIVERSAL GLOBAL SIDEBAR (Occupies 5.8% width on all screens)          -->
        <!-- ======================================================================= -->
        <div class="sidebar-container">
            <div class="sidebar">
                
                <!-- Navigation Buttons: Handled via JavaScript (id added here) -->
                <div class="nav-group" id="sidebar-actions">
                    <button class="side-btn" onclick="sidebarAction('BACK')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#0091ea" stroke-width="3.5"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>BACK
                    </button>
                    <button class="side-btn" onclick="sidebarAction('MONTHS')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>MONTHS
                    </button>
                </div>

                <!-- Printer Status Module: Stays permanently visible at the bottom -->
                <div class="status-container">
                    <div class="status-title">PRINTER<br>STATUS</div>
                    <div class="status-row"><div class="color-box pink"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box green"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box yellow"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box blue"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box text-box">PLAIN</div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box text-box">DISP.</div><div class="led-dot"></div></div>
                </div>
            </div>
        </div>


    </div>
    <script src="app.js"></script>
</body>
</html>
