<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Static Simulation Button bypasses local browser security blocks -->
    <button id="manual-sim-btn" onclick="triggerManualRollOver()">SIMULATE NEXT YEAR &raquo;</button>

    <div class="dashboard-wrapper">
        <div class="main-container">
            <div class="header-title" id="category-header">
                <span id="cat-word1">VEGETABLES</span><span id="cat-word2"></span>
            </div>
            <div class="grid-container" id="master-grid">
                <!-- Rows will be injected dynamically here by JavaScript -->
            </div>
        </div>
        <div class="sidebar-container">
            <div class="sidebar">
                <div class="nav-group">
                    <button class="side-btn" onclick="sidebarAction('BACK')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="#0091ea" stroke-width="3.5"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>BACK
                    </button>
                    <button class="side-btn" onclick="sidebarAction('MONTHS')">
                        <svg viewBox="0 0 24 24" fill="none" stroke="red" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>MONTHS
                    </button>
                </div>
                <div class="status-container">
                    <div class="status-title">PRINTER<br>STATUS</div>
                    <div class="status-row"><div class="color-box pink"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box green"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box yellow"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box blue"></div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box text-box">PLAIN</div><div class="led-dot"></div></div>
                    <div class="status-row"><div class="color-box text-box">DISPATCH</div><div class="led-dot"></div></div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
